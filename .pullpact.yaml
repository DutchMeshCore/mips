version: 1

reactions:
  approve_reaction: "+1"
  reject_reaction: "-1"
  abstain_reaction: "eyes"

pull_requests:
  minimum_voters: 10
  required_approval_ratio: 0.6
  eligible_voters: all
  merge_cooldown_hours: 336
  cooldown_override_approve_votes: 20
  stale_timeout_hours: 336
  vote_settle_hours: 2

  protected_paths:
    - paths: [".pullpact.yaml"]
      minimum_voters: 15
      required_approval_ratio: 0.75
      merge_cooldown_hours: 336
      vote_settle_hours: 4
    - paths: ["PROCESS.md", "GOVERNANCE.md"]
      minimum_voters: 15
      required_approval_ratio: 0.75
      merge_cooldown_hours: 336
      vote_settle_hours: 4
    - paths: ["templates/"]
      minimum_voters: 12
      required_approval_ratio: 0.7
      merge_cooldown_hours: 168
      vote_settle_hours: 3

safety:
  blocked_labels: ["WIP", "DONTMERGE"]

resolution:
  on_pass: report
  on_fail: none
  on_stale: close
