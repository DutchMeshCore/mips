name: Markdown Lint

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.yaml"

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          config: ".markdownlint-cli2.yaml"
          globs: "**/*.md"

# Required checks for main run on every PR via .github/workflows/ci.yml.

